<!DOCTYPE HTML>
<html>
    <head>
        <title>Medical Q&A Chatbot</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
        <link rel="stylesheet" href="static/assets/css/main.css" />
        <noscript><link rel="stylesheet" href="static/assets/css/noscript.css" /></noscript>
        <style>
            /* Class to hide elements cleanly */
            .hidden {
                display: none !important;
            }
            .chat-wrapper {
                margin-top: 20px;
                background: rgba(255, 255, 255, 0.05);
                padding: 20px;
                border-radius: 8px;
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
        </style>
    </head>
    <body class="is-preload">

        <div id="wrapper">
            <header id="header">
                <div class="logo">
                    <span class="icon fa-user-md"></span>
                </div>
                <div class="content">
                    <div class="inner">
                        <h1>Medical Knowledge Assistant</h1>
                        <p id="header-desc">Ask clinical questions based on the initialized medical database.</p>
                        
                        <div class="chat-wrapper" id="chat-interface">
                            <div id="chat-box" class="chat-box">
                                </div>
                            
                            <div class="input-area">
                                <input type="text" id="user-input" placeholder="Type your medical question..." autocomplete="off" onkeydown="if(event.key==='Enter') sendMessage()">
                                <button onclick="sendMessage()" class="send-btn">Send</button>
                            </div>
                        </div>

                    </div>
                </div>
                <nav>
                    <ul>
                        <li><a href="javascript:location.reload()">Start New Session</a></li>
                    </ul>
                </nav>
            </header>

            <div id="main"></div>

            <footer id="footer">
                <p class="copyright">&copy; Medical RAG Project. Design: <a href="https://html5up.net">HTML5 UP</a>.</p>
            </footer>
        </div>

        <div id="bg"></div>

        <script src="static/assets/js/jquery.min.js"></script>
        <script src="static/assets/js/browser.min.js"></script>
        <script src="static/assets/js/breakpoints.min.js"></script>
        <script src="static/assets/js/util.js"></script>
        <script src="static/assets/js/main.js"></script>

        <script>
            // --- Session Management ---
            // Generate a unique session ID for this user when the page loads.
            // This ensures Supabase tracks this specific conversation accurately.
            const sessionId = 'session-' + Math.random().toString(36).substring(2, 15) + Date.now().toString(36);

            // Greet the user automatically on page load
            window.onload = function() {
                addMessage("System: The Medical Knowledge Base is ready. How can I assist you today?", 'bot-message');
            };

            // --- Chat Logic ---
            async function sendMessage() {
                const inputField = document.getElementById('user-input');
                const question = inputField.value.trim();

                if (!question) return;

                // Lock input while processing
                inputField.disabled = true;

                addMessage(question, 'user-message');
                inputField.value = ''; 

                const loadingId = addMessage('Searching medical literature...', 'bot-message');

                try {
                    const response = await fetch('/api/ask', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        // Pass both the query and the unique session ID to the backend
                        body: JSON.stringify({ 
                            query: question,
                            session_id: sessionId
                        })
                    });

                    const data = await response.json();
                    
                    // Safely remove the thinking bubble
                    const loadingElement = document.getElementById(loadingId);
                    if (loadingElement) loadingElement.remove();
                    
                    if (response.ok) {
                        addMessage(data.answer, 'bot-message');
                    } else {
                        addMessage("Error: " + data.detail, 'bot-message');
                    }

                } catch (error) {
                    const loadingElement = document.getElementById(loadingId);
                    if (loadingElement) loadingElement.remove();
                    
                    addMessage("Could not connect to the server.", 'bot-message');
                    console.error(error);
                } finally {
                    // Unlock input
                    inputField.disabled = false;
                    inputField.focus();
                }
            }

            // --- UI Rendering ---
            function addMessage(text, className) {
                const chatBox = document.getElementById('chat-box');
                const div = document.createElement('div');
                div.className = `message ${className}`;
                
                // Random string generator to guarantee the ID is 100% unique
                const uniqueId = Math.random().toString(36).substring(2, 11);
                div.id = 'msg-' + Date.now() + '-' + uniqueId; 
                
                div.innerText = text;
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight; 
                return div.id;
            }
        </script>
    </body>
</html>
